  1.2.0:
    changes:
      bugfixes:
      - anycast_config, anycast_config_info - Fixed an invalid ``service`` choice
        (``DHCP``) that should have been ``NTP`` (https://github.com/infobloxopen/universal-ddi-ansible/pull/58).
      - cloud_discovery_providers - Fixed provider deletion to transition the provider
        to a disabled state before deleting it, as required by the API (https://github.com/infobloxopen/universal-ddi-ansible/pull/68).
      - dns_record, ipam_address_block, ipam_ip_space, ipam_subnet - Fixed ``changed``
        status reporting by re-reading the resource when the API's update response
        omits the result object (https://github.com/infobloxopen/universal-ddi-ansible/pull/58).
      minor_changes:
      - cloud_discovery_providers - Added a ``zone_filters`` option to include or
        exclude specific zones from discovery for AWS, Azure, and GCP providers (https://github.com/infobloxopen/universal-ddi-ansible/pull/68).
      - dhcp_ha_group - ``anycast`` mode is deprecated (https://github.com/infobloxopen/universal-ddi-ansible/pull/58).
      - dns_record - Added a ``configure_record_protection`` option to set, update,
        or remove protected-access levels on DNS resource records (https://github.com/infobloxopen/universal-ddi-ansible/pull/51).
      - dns_record, dns_record_info - Added a ``target_name`` ``rdata`` sub-option
        used by HTTPS/SVCB record types (https://github.com/infobloxopen/universal-ddi-ansible/pull/51).
      - dns_record, dns_record_info - Added support for managing SSHFP (SSH public
        key fingerprint) records (https://github.com/infobloxopen/universal-ddi-ansible/pull/61).
      - ipam_address_block, ipam_ip_space - Added previously missing ``authoritative_dhcp``,
        ``hold_reclaimed_time``, and ``hold_reclaimed_time_v6`` inheritance options
        (https://github.com/infobloxopen/universal-ddi-ansible/pull/58).
      release_summary: 'Adds full Ansible support for DTC (DNS Traffic Control): new
        modules for DTC Servers, Pools, Policies, LBDNs, and HTTP/ICMP/SNMP/TCP Health
        Checks (plus SNMP User Security Models). Also adds SSHFP and HTTPS DNS
        record support, a new record-protection option to ``dns_record``, zone
        filtering in ``cloud_discovery_providers``, and several bug fixes across
        Anycast, DHCP, DNS, IPAM, and Cloud Discovery modules.

        '

name: Prepare Release Documentation

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.0)"
        required: true
        type: string
      base_ref:
        description: "Previous release tag (e.g., v1.1.0)"
        required: true
        type: string
      head_ref:
        description: "Head ref to generate notes for (default: HEAD)"
        required: false
        default: "HEAD"
        type: string
      model:
        description: "AI model to use for analysis"
        required: false
        default: "gpt-4o"
        type: choice
        options:
          - gpt-4o
          - gpt-4o-mini

jobs:
  prepare-release-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r .github/scripts/requirements.txt
          pip install antsibull-changelog

      - name: Generate release notes and changelog entry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          AI_API_BASE_URL: "https://models.github.ai/inference"
        run: |
          python .github/scripts/generate_release.py \
            --version "${{ inputs.version }}" \
            --base-ref "${{ inputs.base_ref }}" \
            --head-ref "${{ inputs.head_ref }}" \
            --model "${{ inputs.model }}"

      - name: Bump version in galaxy.yml
        run: |
          sed -i "s/^version: .*/version: ${{ inputs.version }}/" galaxy.yml

      - name: Build CHANGELOG.rst from changelog.yaml
        run: antsibull-changelog release -v

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-v${{ inputs.version }}-notes
          path: |
            release_output/release_notes.md
            release_output/pr_titles_verbatim.md
            release_output/pr_titles_combined.md
            release_output/pr_titles_ignored.md

      - name: Create PR with release doc updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="release/v${{ inputs.version }}-docs"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH_NAME}"
          git add changelogs/changelog.yaml CHANGELOG.rst galaxy.yml
          git commit -m "chore: prepare release docs for v${{ inputs.version }}"
          git push origin "${BRANCH_NAME}"

          gh pr create \
            --title "chore: Prepare release docs for v${{ inputs.version }}" \
            --body "## Automated Release Documentation

          This PR was automatically generated by the **Prepare Release Documentation** workflow.

          ### What's included
          - Updated \`changelogs/changelog.yaml\` with entries for v${{ inputs.version }}
          - Regenerated \`CHANGELOG.rst\` via \`antsibull-changelog release\`
          - Bumped \`version\` in \`galaxy.yml\` to \`${{ inputs.version }}\`

          ### Artifacts
          The following files are available as workflow artifacts:
          - \`release_notes.md\` — Ready to paste into the GitHub Release
          - \`pr_titles_verbatim.md\` — Raw PR titles included in this release
          - \`pr_titles_combined.md\` — Log of which PRs were grouped together
          - \`pr_titles_ignored.md\` — PRs excluded from changelog

          ### Review
          Please review the changelog entries and version bump for accuracy before merging." \
            --base master \
            --head "${BRANCH_NAME}"

name: Generate Release Notes & Changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.0)"
        required: true
        type: string
      base_ref:
        description: "Previous release tag (e.g., v1.1.0)"
        required: true
        type: string
      head_ref:
        description: "Head ref to generate notes for (default: HEAD)"
        required: false
        default: "HEAD"
        type: string
      model:
        description: "AI model to use for analysis"
        required: false
        default: "gpt-4o"
        type: choice
        options:
          - gpt-4o
          - gpt-4o-mini

jobs:
  generate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate release notes and changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          AI_API_BASE_URL: "https://models.github.ai/inference"
        run: |
          python scripts/generate_release.py \
            --version "${{ inputs.version }}" \
            --base-ref "${{ inputs.base_ref }}" \
            --head-ref "${{ inputs.head_ref }}" \
            --model "${{ inputs.model }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-v${{ inputs.version }}-notes
          path: |
            release_output/release_notes.md
            release_output/pr_titles_verbatim.md
            release_output/pr_titles_combined.md
            release_output/pr_titles_ignored.md

      - name: Create PR with changelog update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="release/v${{ inputs.version }}-changelog"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "${BRANCH_NAME}"
          git add changelogs/changelog.yaml
          git commit -m "chore: update changelog for v${{ inputs.version }}"
          git push origin "${BRANCH_NAME}"
          
          gh pr create \
            --title "chore: Update changelog for v${{ inputs.version }}" \
            --body "## Automated Changelog Update

          This PR was automatically generated by the release notes workflow.

          ### What's included
          - Updated \`changelogs/changelog.yaml\` with entries for v${{ inputs.version }}

          ### Artifacts
          The following files are available as workflow artifacts:
          - \`release_notes.md\` — Ready to paste into GitHub Release
          - \`pr_titles_verbatim.md\` — Raw PR titles included in this release
          - \`pr_titles_combined.md\` — Log of which PRs were grouped together

          ### Review
          Please review the changelog entries for accuracy before merging." \
            --base master \
            --head "${BRANCH_NAME}"

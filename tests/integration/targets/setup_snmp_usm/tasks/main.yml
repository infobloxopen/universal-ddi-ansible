---
# Setup role for SNMP User Security Model (USM) for v3 health checks
#
# This role creates an SNMP USM configuration for testing
# dtc_health_check_snmp with SNMP v3.
#
# Output facts:
#   _snmp_usm: The created USM object
#   _snmp_usm_id: The USM resource ID to use for v3 health checks
#   _snmp_usm_username: The USM username
#   _snmp_usm_available: Boolean indicating USM is available for v3 testing

- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"
  block:
    # Create a random USM username to avoid conflicts
    - ansible.builtin.set_fact:
        _snmp_usm_username: "test-usm-{{ 999999 | random | string }}"

    - name: Create SNMP User Security Model
      infoblox.universal_ddi.dtc_snmp_user_security_model:
        username: "{{ _snmp_usm_username }}"
        auth_protocol: "NoAuth"
        privacy_protocol: "NoPrivacy"
        state: present
      register: _snmp_usm

    - name: Set SNMP USM facts
      ansible.builtin.set_fact:
        _snmp_usm_id: "{{ _snmp_usm.id }}"
        _snmp_usm_available: true

    - name: Display SNMP USM status
      ansible.builtin.debug:
        msg: "SNMP USM configuration created. USM ID: {{ _snmp_usm_id }}, Username: {{ _snmp_usm_username }}"

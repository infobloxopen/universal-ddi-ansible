---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"

  block:
    # Create a random name to avoid conflicts
    - ansible.builtin.set_fact:
        record_name: "test-generic-record-{{ 999999 | random | string }}"

    - name: Create a Generic Record (check mode)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        state: present
      check_mode: true
      register: generic_record
    - name: Get information about the Generic Record (check mode)
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record is changed
          - generic_record_info is not failed
          - generic_record_info.objects | length == 0

    - name: Create a Generic Record
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        state: present
      register: generic_record
    - name: Get information about the Generic Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record is changed
          - generic_record_info is not failed
          - generic_record_info.objects | length == 1
          - generic_record_info.objects[0].id == generic_record.id
          - generic_record_info.objects[0].rdata.subfields[0].value == "10 1 \"https://example.com\""
          - generic_record_info.objects[0].type == "TYPE256"
          - generic_record_info.objects[0].zone == generic_record.object.zone

    - name: Create a Generic Record (idempotent)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        state: present
      register: generic_record
    - assert:
        that:
          - generic_record is not changed
          - generic_record is not failed

    - name: Delete Generic Record (check mode)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        type: "TYPE256"
        state: absent
      check_mode: true
      register: generic_record
    - name: Get information about the Generic Record (check mode)
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record is changed
          - generic_record_info is not failed
          - generic_record_info.objects | length == 1

    - name: Delete Generic Record
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        type: "TYPE256"
        state: absent
      register: generic_record
    - name: Get information about the Generic Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record_info is not failed
          - generic_record_info.objects | length == 0

    - name: Delete Generic Record (idempotent)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        type: "TYPE256"
        state: absent
      register: generic_record
    - assert:
        that:
          - generic_record is not changed
          - generic_record is not failed

    - name: Create a Generic Record with comment
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        comment: "This is a test Generic Record"
        state: present
      register: generic_record
    - name: Get information about the Generic Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record_info is not failed
          - generic_record_info.objects | length == 1
          - generic_record_info.objects[0].id == generic_record.id
          - generic_record_info.objects[0].comment == "This is a test Generic Record"

    - name: Create a Generic Record with TTL
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        ttl: 3600
        state: present
      register: generic_record
    - name: Get information about the Generic Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record_info is not failed
          - generic_record_info.objects | length == 1
          - generic_record_info.objects[0].id == generic_record.id
          - generic_record_info.objects[0].ttl == 3600

    - name: Create a Generic Record with Disabled
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        disabled: true
        state: present
      register: generic_record
    - name: Get information about the Generic Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record_info is not failed
          - generic_record_info.objects | length == 1
          - generic_record_info.objects[0].id == generic_record.id
          - generic_record_info.objects[0].disabled == true

    - name: Create a Generic Record with Tags
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        tags:
          location: "site-1"
        state: present
      register: generic_record
    - name: Get information about the Generic Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record_info is not failed
          - generic_record_info.objects | length == 1
          - generic_record_info.objects[0].id == generic_record.id
          - generic_record_info.objects[0].tags.location == "site-1"

    - name: Create a Generic Record with Inheritance Sources
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        inheritance_sources:
          ttl:
            action: "inherit"
        state: present
      register: generic_record
    - name: Get information about the Generic Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record_info is not failed
          - generic_record_info.objects | length == 1
          - generic_record_info.objects[0].id == generic_record.id
          - generic_record_info.objects[0].inheritance_sources.ttl.action == "inherit"

    - name: Create a Generic Record with Name in Zone and Zone
      infoblox.universal_ddi.dns_record:
        name_in_zone: "{{ record_name }}"
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        state: present
      register: generic_record
    - name: Get information about the Generic Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "{{ record_name }}"
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record_info is not failed
          - generic_record_info.objects | length == 1
          - generic_record_info.objects[0].id == generic_record.id
          - generic_record_info.objects[0].name_in_zone == generic_record.object.name_in_zone
          - generic_record_info.objects[0].zone == generic_record.object.zone

    - name: Create a Generic Record with Record Protection - DDI Admin
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-ddi-admin"
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        configure_record_protection: "DDI Admin"
        state: present
      register: generic_record_ddi_admin
    - name: Get information about the Generic Record with DDI Admin protection
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "protected-ddi-admin"
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record_ddi_admin is changed
          - generic_record_info is not failed
          - generic_record_info.objects | length == 1
          - generic_record_info.objects[0].id == generic_record_ddi_admin.id
          - generic_record_info.objects[0]['protection']['level'] == "DDI Admin"

    - name: Create a Generic Record with Record Protection - Global Admin
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-global-admin"
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        configure_record_protection: "Global Admin"
        state: present
      register: generic_record_global_admin
    - name: Get information about the Generic Record with Global Admin protection
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "protected-global-admin"
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record_global_admin is changed
          - generic_record_info is not failed
          - generic_record_info.objects | length == 1
          - generic_record_info.objects[0].id == generic_record_global_admin.id
          - generic_record_info.objects[0]['protection']['level'] == "Global Admin"

    - name: Create a Generic Record with Record Protection - DDI Admin (idempotent)
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-ddi-admin"
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        configure_record_protection: "DDI Admin"
        state: present
      register: generic_record
    - assert:
        that:
          - generic_record is not changed
          - generic_record is not failed

    - name: Create a Generic Record with Record Protection - Global Admin (idempotent)
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-global-admin"
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        configure_record_protection: "Global Admin"
        state: present
      register: generic_record
    - assert:
        that:
          - generic_record is not changed
          - generic_record is not failed

    - name: Update Generic Record Protection from DDI Admin to Global Admin
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-ddi-admin"
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        configure_record_protection: "Global Admin"
        state: present
      register: generic_record
    - name: Get information about the Generic Record after protection change
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "protected-ddi-admin"
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record is changed
          - generic_record is not failed
          - generic_record_info.objects[0]['protection']['level'] == "Global Admin"

    - name: Remove protection from Generic Record (None)
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-global-admin"
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        configure_record_protection: "None"
        state: present
      register: generic_record
    - name: Get information about the Generic Record after protection removed
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "protected-global-admin"
          zone: "{{ _auth_zone.id }}"
          type: "TYPE256"
      register: generic_record_info
    - assert:
        that:
          - generic_record is changed
          - generic_record is not failed
          - generic_record_info.objects[0]['protection'] is not defined or generic_record_info.objects[0]['protection']['level'] is not defined

    - name: Remove protection from Generic Record (None, idempotent)
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-global-admin"
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        configure_record_protection: "None"
        state: present
      register: generic_record
    - assert:
        that:
          - generic_record is not changed
          - generic_record is not failed

  always:
    - name: "Remove protection from Generic Record with DDI Admin protection"
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-ddi-admin"
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        configure_record_protection: "None"
        state: present
      ignore_errors: true

    - name: "Delete the Generic Record with DDI Admin protection"
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-ddi-admin"
        zone: "{{ _auth_zone.id }}"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        type: "TYPE256"
        state: absent
      ignore_errors: true

    - name: "Remove protection from Generic Record with Global Admin protection"
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-global-admin"
        zone: "{{ _auth_zone.id }}"
        type: "TYPE256"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        configure_record_protection: "None"
        state: present
      ignore_errors: true

    - name: "Delete the Generic Record with Global Admin protection"
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-global-admin"
        zone: "{{ _auth_zone.id }}"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        type: "TYPE256"
        state: absent
      ignore_errors: true

    - name: "Delete Generic Record"
      infoblox.universal_ddi.dns_record:
        name_in_zone: "{{ record_name }}"
        zone: "{{ _auth_zone.id }}"
        rdata:
          subfields:
            - type: "PRESENTATION"
              value: "10 1 \"https://example.com\""
        type: "TYPE256"
        state: "absent"
      ignore_errors: true

    - name: "Delete Auth Zone"
      ansible.builtin.include_role:
       name: setup_auth_zone
       tasks_from: cleanup.yml

    - name: "Delete the View"
      ansible.builtin.include_role:
       name: setup_view
       tasks_from: cleanup.yml

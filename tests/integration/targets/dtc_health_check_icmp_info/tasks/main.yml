---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"
  block:
    # Create a random ICMP Health Check name and tag to avoid conflicts
    - ansible.builtin.set_fact:
        health_check_icmp_name: "test-health_check_icmp_name-{{ 999999 | random | string }}"
        tag_value: "site-{{ 999999 | random | string }}"

    # Basic Test for ICMP Health Check
    - name: Create ICMP Health Check
      infoblox.universal_ddi.dtc_health_check_icmp:
        name: "{{ health_check_icmp_name }}"
        tags:
          location: "{{ tag_value }}"
        state: present
      register: health_check_icmp

    - name: Get ICMP Health Check information by filters (name)
      infoblox.universal_ddi.dtc_health_check_icmp_info:
        filters:
          name: "{{ health_check_icmp_name }}"
      register: health_check_icmp_info
    - assert:
        that:
          - health_check_icmp_info.objects | length == 1
          - health_check_icmp_info.objects[0].id == health_check_icmp.id

    - name: Get ICMP Health Check information by filters (id)
      infoblox.universal_ddi.dtc_health_check_icmp_info:
        filters:
          id: "{{ health_check_icmp.id }}"
      register: health_check_icmp_info
    - assert:
        that:
          - health_check_icmp_info.objects | length == 1
          - health_check_icmp_info.objects[0].id == health_check_icmp.id

    - name: Get ICMP Health Check information by filter query
      infoblox.universal_ddi.dtc_health_check_icmp_info:
        filter_query: "name=='{{ health_check_icmp_name }}'"
      register: health_check_icmp_info
    - assert:
        that:
          - health_check_icmp_info.objects | length == 1
          - health_check_icmp_info.objects[0].id == health_check_icmp.id

    - name: Get ICMP Health Check information by tag filters
      infoblox.universal_ddi.dtc_health_check_icmp_info:
        tag_filters:
          location: "{{ tag_value }}"
      register: health_check_icmp_info
    - assert:
        that:
          - health_check_icmp_info.objects | length == 1
          - health_check_icmp_info.objects[0].id == health_check_icmp.id

    - name: Get ICMP Health Check information by tag filter query
      infoblox.universal_ddi.dtc_health_check_icmp_info:
        tag_filter_query: "location=='{{ tag_value }}'"
      register: health_check_icmp_info
    - assert:
        that:
          - health_check_icmp_info.objects | length == 1
          - health_check_icmp_info.objects[0].id == health_check_icmp.id
          - health_check_icmp_info.objects[0].tags.location == tag_value

  always:
    # Cleanup if the test fails
    - name: "Delete ICMP Health Check"
      infoblox.universal_ddi.dtc_health_check_icmp:
        name: "{{ health_check_icmp_name }}"
        tags:
          location: "{{ tag_value }}"
        state: absent
      ignore_errors: true

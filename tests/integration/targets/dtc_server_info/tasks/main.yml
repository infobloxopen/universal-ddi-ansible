---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"
  block:
    - ansible.builtin.set_fact:
        dtc_server_name: "test-dtc-server-{{ 999999 | random | string }}"
        tag_value: "site-{{ 999999 | random | string }}"

    - name: Create a DTC Server
      infoblox.universal_ddi.dtc_server:
        name: "{{ dtc_server_name }}"
        address: "10.0.0.25"
        tags:
          location: "{{ tag_value }}"
        state: "present"
      register: dtc_server

    - name: Get information about the DTC Server by filters (name)
      infoblox.universal_ddi.dtc_server_info:
        filters:
          name: "{{ dtc_server_name }}"
      register: dtc_server_info
    - assert:
        that:
          - dtc_server_info.objects | length == 1
          - dtc_server_info.objects[0].name == dtc_server_name
          - dtc_server_info.objects[0].id == dtc_server.id

    - name: Get information about the DTC Server by ID
      infoblox.universal_ddi.dtc_server_info:
        id: "{{ dtc_server.id }}"
      register: dtc_server_info
    - assert:
        that:
          - dtc_server_info.objects | length == 1
          - dtc_server_info.objects[0].name == dtc_server_name
          - dtc_server_info.objects[0].id == dtc_server.id

    - name: Get information about the DTC Server by filter query
      infoblox.universal_ddi.dtc_server_info:
        filter_query: "name=='{{ dtc_server_name }}'"
      register: dtc_server_info
    - assert:
        that:
          - dtc_server_info.objects | length == 1
          - dtc_server_info.objects[0].id == dtc_server.id
          - dtc_server_info.objects[0].name == dtc_server_name

    - name: Get information about the DTC Server by tag filters
      infoblox.universal_ddi.dtc_server_info:
        tag_filters:
          location: "{{ tag_value }}"
      register: dtc_server_info
    - assert:
        that:
          - dtc_server_info.objects | length == 1
          - dtc_server_info.objects[0].id == dtc_server.id
          - dtc_server_info.objects[0].tags.location == tag_value

    - name: Get information about the DTC Server with tag filter query
      infoblox.universal_ddi.dtc_server_info:
        tag_filter_query: "location=='{{ tag_value }}'"
      register: dtc_server_info
    - assert:
        that:
          - dtc_server_info.objects | length == 1
          - dtc_server_info.objects[0].id == dtc_server.id
          - dtc_server_info.objects[0].tags.location == tag_value

  always:
    - name: Delete DTC Server
      infoblox.universal_ddi.dtc_server:
        name: "{{ dtc_server_name }}"
        address: "10.0.0.25"
        state: "absent"
      ignore_errors: true

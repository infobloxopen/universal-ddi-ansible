---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"

  block:
    - ansible.builtin.set_fact:
        record_name: "test-alias-record-{{ 999999 | random | string }}"
        tag_value: "site-{{ 999999 | random | string }}"

    - name: Create an Alias Record
      infoblox.universal_ddi.dns_record:
        name_in_zone: "{{ record_name }}"
        zone: "{{ _auth_zone.id }}"
        rdata:
          target_name: "target.example.com"
          target_type: "A"
        type: "ALIAS"
        tags:
          location: "{{ tag_value }}"
        state: present
      register: alias_record

    - name: Get Alias Record information by ID
      infoblox.universal_ddi.dns_record_info:
        id: "{{ alias_record.id }}"
      register: alias_record_info
    - assert:
        that:
          - alias_record_info.objects | length == 1

    - name: Get Alias Record information by filters
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "{{ record_name }}"
          zone: "{{ _auth_zone.id }}"
          type: "ALIAS"
      register: alias_record_info
    - assert:
        that:
          - alias_record_info.objects | length == 1
          - alias_record_info.objects[0].id == alias_record.id

    - name: Get Alias Record information by raw filter query
      infoblox.universal_ddi.dns_record_info:
        filter_query: "name_in_zone=='{{ record_name }}' and zone=='{{ _auth_zone.id }}' and type=='ALIAS'"
      register: alias_record_info
    - assert:
        that:
          - alias_record_info.objects | length == 1
          - alias_record_info.objects[0].id == alias_record.id

    - name: Get Alias Record information by tag filters
      infoblox.universal_ddi.dns_record_info:
        tag_filters:
          location: "{{ tag_value }}"
      register: alias_record_info
    - assert:
        that:
          - alias_record_info.objects | length == 1
          - alias_record_info.objects[0].id == alias_record.id

  always:
    - name: Delete Alias Record
      infoblox.universal_ddi.dns_record:
        name_in_zone: "{{ record_name }}"
        zone: "{{ _auth_zone.id }}"
        rdata:
          target_name: "target.example.com"
          target_type: "A"
        type: "ALIAS"
        state: absent
      ignore_errors: true

    - name: Delete Auth Zone
      ansible.builtin.include_role:
        name: setup_auth_zone
        tasks_from: cleanup.yml

    - name: Delete the View
      ansible.builtin.include_role:
        name: setup_view
        tasks_from: cleanup.yml

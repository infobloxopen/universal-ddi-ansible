---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"
  block:
    # Create random SNMP Health Check names and tag to avoid conflicts
    - ansible.builtin.set_fact:
        health_check_snmp_name: "test-health-check-snmp-{{ 999999 | random | string }}"
        health_check_snmp_name_2: "test-health-check-snmp-2-{{ 999999 | random | string }}"
        tag_value: "site-{{ 999999 | random | string }}"

    # Create SNMP Health Check for testing info module
    - name: Create SNMP Health Check
      infoblox.universal_ddi.dtc_health_check_snmp:
        name: "{{ health_check_snmp_name }}"
        version: "v2c"
        community: "public"
        tags:
          location: "{{ tag_value }}"
        state: present
      register: health_check_snmp

    # Test: Get SNMP Health Check by ID
    - name: Get SNMP Health Check information by ID
      infoblox.universal_ddi.dtc_health_check_snmp_info:
        id: "{{ health_check_snmp.id }}"
      register: health_check_snmp_info
    - assert:
        that:
          - health_check_snmp_info is not failed
          - health_check_snmp_info.objects | length == 1
          - health_check_snmp_info.objects[0].id == health_check_snmp.id
          - health_check_snmp_info.objects[0].name == health_check_snmp.object.name

    # Test: Get SNMP Health Check by filters (id)
    - name: Get SNMP Health Check information by filters (id)
      infoblox.universal_ddi.dtc_health_check_snmp_info:
        filters:
          id: "{{ health_check_snmp.id }}"
      register: health_check_snmp_info
    - assert:
        that:
          - health_check_snmp_info is not failed
          - health_check_snmp_info.objects | length == 1
          - health_check_snmp_info.objects[0].id == health_check_snmp.id

    # Test: Get SNMP Health Check by filters (name)
    - name: Get SNMP Health Check information by filters (name)
      infoblox.universal_ddi.dtc_health_check_snmp_info:
        filters:
          name: "{{ health_check_snmp_name }}"
      register: health_check_snmp_info
    - assert:
        that:
          - health_check_snmp_info is not failed
          - health_check_snmp_info.objects | length == 1
          - health_check_snmp_info.objects[0].id == health_check_snmp.id
          - health_check_snmp_info.objects[0].name == health_check_snmp_name

    # Test: Get SNMP Health Check by filter_query
    - name: Get SNMP Health Check information by filter_query
      infoblox.universal_ddi.dtc_health_check_snmp_info:
        filter_query: "name=='{{ health_check_snmp_name }}'"
      register: health_check_snmp_info
    - assert:
        that:
          - health_check_snmp_info is not failed
          - health_check_snmp_info.objects | length == 1
          - health_check_snmp_info.objects[0].id == health_check_snmp.id

    # Test: Get SNMP Health Check by tag_filters
    - name: Get SNMP Health Check information by tag_filters
      infoblox.universal_ddi.dtc_health_check_snmp_info:
        tag_filters:
          location: "{{ tag_value }}"
      register: health_check_snmp_info
    - assert:
        that:
          - health_check_snmp_info is not failed
          - health_check_snmp_info.objects | length == 1
          - health_check_snmp_info.objects[0].id == health_check_snmp.id

    # Test: Get SNMP Health Check by tag_filter_query
    - name: Get SNMP Health Check information by tag_filter_query
      infoblox.universal_ddi.dtc_health_check_snmp_info:
        tag_filter_query: "location=='{{ tag_value }}'"
      register: health_check_snmp_info
    - assert:
        that:
          - health_check_snmp_info is not failed
          - health_check_snmp_info.objects | length == 1
          - health_check_snmp_info.objects[0].id == health_check_snmp.id

    # Test: Get all SNMP Health Checks (no filters)
    - name: Get all SNMP Health Check information
      infoblox.universal_ddi.dtc_health_check_snmp_info:
      register: health_check_snmp_info
    - assert:
        that:
          - health_check_snmp_info is not failed
          - health_check_snmp_info.objects | length >= 1

    # Test: Get SNMP Health Check with non-existent name
    - name: Get SNMP Health Check information with non-existent name
      infoblox.universal_ddi.dtc_health_check_snmp_info:
        filters:
          name: "non-existent-health-check"
      register: health_check_snmp_info
    - assert:
        that:
          - health_check_snmp_info is not failed
          - health_check_snmp_info.objects | length == 0

    # Test: Create second SNMP Health Check and verify multiple results
    - name: Create second SNMP Health Check
      infoblox.universal_ddi.dtc_health_check_snmp:
        name: "{{ health_check_snmp_name_2 }}"
        version: "v2c"
        community: "public"
        tags:
          location: "{{ tag_value }}"
        state: present
      register: health_check_snmp_2

    - name: Get SNMP Health Check information by shared tag
      infoblox.universal_ddi.dtc_health_check_snmp_info:
        tag_filters:
          location: "{{ tag_value }}"
      register: health_check_snmp_info
    - assert:
        that:
          - health_check_snmp_info is not failed
          - health_check_snmp_info.objects | length == 2

    # Test: Verify returned object fields
    - name: Verify SNMP Health Check object fields
      infoblox.universal_ddi.dtc_health_check_snmp_info:
        id: "{{ health_check_snmp.id }}"
      register: health_check_snmp_info
    - assert:
        that:
          - health_check_snmp_info is not failed
          - health_check_snmp_info.objects[0].name == health_check_snmp_name
          - health_check_snmp_info.objects[0].version == "v2c"
          - health_check_snmp_info.objects[0].community == "public"
          - health_check_snmp_info.objects[0].tags.location == tag_value

  always:
    # Cleanup
    - name: "Delete SNMP Health Check"
      infoblox.universal_ddi.dtc_health_check_snmp:
        name: "{{ health_check_snmp_name }}"
        version: "v2c"
        community: "public"
        state: absent
      ignore_errors: true

    - name: "Delete second SNMP Health Check"
      infoblox.universal_ddi.dtc_health_check_snmp:
        name: "{{ health_check_snmp_name_2 }}"
        version: "v2c"
        community: "public"
        state: absent
      ignore_errors: true

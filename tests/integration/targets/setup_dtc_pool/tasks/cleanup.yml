---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"
  block:
    - name: "Delete DTC Pool 1"
      infoblox.universal_ddi.dtc_pool:
        name: "{{ dtc_pool_1_name }}"
        method: "round_robin"
        state: absent
      ignore_errors: true

    - name: "Delete DTC Pool 2"
      infoblox.universal_ddi.dtc_pool:
        name: "{{ dtc_pool_2_name }}"
        method: "global_availability"
        state: absent
      ignore_errors: true

    - name: "Delete DTC Pool 3"
      infoblox.universal_ddi.dtc_pool:
        name: "{{ dtc_pool_3_name }}"
        method: "global_availability"
        state: absent
      ignore_errors: true

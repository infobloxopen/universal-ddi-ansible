---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"

  block:
    - ansible.builtin.set_fact:
        record_name: "test-sshfp-record-{{ 999999 | random | string }}"
        tag_value: "site-{{ 999999 | random | string }}"

    - name: Create an SSHFP Record
      infoblox.universal_ddi.dns_record:
        name_in_zone: "{{ record_name }}"
        zone: "{{ _auth_zone.id }}"
        type: "SSHFP"
        rdata:
          algorithm: 4
          fingerprint_type: 2
          fingerprint: "1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
        tags:
          location: "{{ tag_value }}"
        state: present
      register: sshfp_record

    - name: Get SSHFP Record information by ID
      infoblox.universal_ddi.dns_record_info:
        id: "{{ sshfp_record.id }}"
      register: sshfp_record_info
    - assert:
        that:
          - sshfp_record_info.objects | length == 1

    - name: Get SSHFP Record information by filters
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "{{ record_name }}"
          zone: "{{ _auth_zone.id }}"
          type: "SSHFP"
      register: sshfp_record_info
    - assert:
        that:
          - sshfp_record_info.objects | length == 1
          - sshfp_record_info.objects[0].id == sshfp_record.id

    - name: Get SSHFP Record information by raw filter query
      infoblox.universal_ddi.dns_record_info:
        filter_query: "name_in_zone=='{{ record_name }}' and zone=='{{ _auth_zone.id }}' and type=='SSHFP'"
      register: sshfp_record_info
    - assert:
        that:
          - sshfp_record_info.objects | length == 1
          - sshfp_record_info.objects[0].id == sshfp_record.id

    - name: Get SSHFP Record information by tag filters
      infoblox.universal_ddi.dns_record_info:
        tag_filters:
          location: "{{ tag_value }}"
      register: sshfp_record_info
    - assert:
        that:
          - sshfp_record_info.objects | length == 1
          - sshfp_record_info.objects[0].id == sshfp_record.id

  always:
    - name: Delete SSHFP Record
      infoblox.universal_ddi.dns_record:
        name_in_zone: "{{ record_name }}"
        zone: "{{ _auth_zone.id }}"
        type: "SSHFP"
        rdata:
          algorithm: 4
          fingerprint_type: 2
          fingerprint: "1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
        state: absent
      ignore_errors: true

    - name: Delete Auth Zone
      ansible.builtin.include_role:
        name: setup_auth_zone
        tasks_from: cleanup.yml

    - name: Delete the View
      ansible.builtin.include_role:
        name: setup_view
        tasks_from: cleanup.yml

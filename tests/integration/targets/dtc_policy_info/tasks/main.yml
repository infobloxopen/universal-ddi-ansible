---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"

  block:
    - ansible.builtin.set_fact:
        dtc_policy_name: "test-dtc-policy-{{ 999999 | random | string }}"
        tag_value: "site-{{ 999999 | random | string }}"

    - name: Create a DTC Policy
      infoblox.universal_ddi.dtc_policy:
        name: "{{ dtc_policy_name }}"
        method: "round_robin"
        tags:
          location: "{{ tag_value }}"
        state: present
      register: dtc_policy

    - name: Get Information about the DTC Policy by ID
      infoblox.universal_ddi.dtc_policy_info:
        id: "{{ dtc_policy.object.id }}"
      register: dtc_policy_info
    - assert:
        that:
          - dtc_policy_info.objects | length == 1
          - dtc_policy_info.objects[0].id == dtc_policy.object.id

    - name: Get DTC Policy information by filters (Name)
      infoblox.universal_ddi.dtc_policy_info:
        filters:
          name: "{{ dtc_policy_name }}"
      register: dtc_policy_info
    - assert:
        that:
          - dtc_policy_info.objects | length == 1
          - dtc_policy_info.objects[0].id == dtc_policy.object.id

    - name: Get DTC Policy information by raw filter query
      infoblox.universal_ddi.dtc_policy_info:
        filter_query: "name=='{{ dtc_policy_name }}'"
      register: dtc_policy_info
    - assert:
        that:
          - dtc_policy_info.objects | length == 1
          - dtc_policy_info.objects[0].id == dtc_policy.object.id

    - name: Get DTC Policy information by tag filters
      infoblox.universal_ddi.dtc_policy_info:
        tag_filters:
          location: "{{ tag_value }}"
      register: dtc_policy_info
    - assert:
        that:
          - dtc_policy_info.objects | length == 1
          - dtc_policy_info.objects[0].id == dtc_policy.object.id

  always:
    - name: Delete the DTC Policy
      infoblox.universal_ddi.dtc_policy:
        name: "{{ dtc_policy_name }}"
        method: "round_robin"
        state: absent
      ignore_errors: true

---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"

  block:
    - ansible.builtin.set_fact:
        health_check_http_name: "test-health_check_http_name-{{ 999999 | random | string }}"
        tag_value: "site-{{ 999999 | random | string }}"

    - name: Create HTTP Health Check (check mode)
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        state: present
      check_mode: true
      register: health_check_http
    - name: Get HTTP Health Check information
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http is changed
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 0

    - name: Create a HTTP Health Check
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        tags:
          location: "{{ tag_value }}"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by ID
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 1
          - health_check_http_info.objects[0].id == health_check_http.id
          - health_check_http_info.objects[0].tags.location == tag_value

    - name: Create HTTP Health Check (idempotent)
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        tags:
          location: "{{ tag_value }}"
        state: present
      register: health_check_http
    - assert:
        that:
          - health_check_http is not changed
          - health_check_http is not failed

    - name: Delete HTTP Health Check (check mode)
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "DELETE / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        tags:
          location: "{{ tag_value }}"
        state: absent
      check_mode: true
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http is changed
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 1

    - name: Delete HTTP Health Check
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "DELETE / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        tags:
          location: "{{ tag_value }}"
        state: absent
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http is changed
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 0

    - name: Delete HTTP Health Check (idempotent)
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "DELETE / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        tags:
          location: "{{ tag_value }}"
        state: absent
      register: health_check_http
    - assert:
        that:
          - health_check_http is not changed
          - health_check_http.failed is not defined or not health_check_http is failed

    - name: Create HTTP Health Check with comment
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        comment: "Test Comment"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 1
          - health_check_http_info.objects[0].comment == "Test Comment"

    - name: Create HTTP Health Check with tags
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        tags:
          test_tag: "tag_value"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 1
          - health_check_http_info.objects[0].tags.test_tag == "tag_value"

    - name: Create HTTP Health Check with disabled true
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        disabled: true
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 1
          - health_check_http_info.objects[0].disabled == true

    - name: Create HTTP Health Check with interval
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        interval: 20
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 1
          - health_check_http_info.objects[0].interval == 20

    - name: Create HTTP Health Check with port
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 8080
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 1
          - health_check_http_info.objects[0].port == 8080

    - name: Create HTTP Health Check with retry_down
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        retry_down: 2
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 1
          - health_check_http_info.objects[0].retry_down == 2

    - name: Create HTTP Health Check with retry_up
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        retry_up: 3
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 1
          - health_check_http_info.objects[0].retry_up == 3

    - name: Create HTTP Health Check with timeout
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        timeout: 10
        interval: 20
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info is not failed
          - health_check_http_info.objects | length == 1
          - health_check_http_info.objects[0].timeout == 10

    - name: Create HTTP Health Check with codes
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        codes: "200,202"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info.objects[0].codes == "200,202"

    - name: Create HTTP Health Check with check_response_body
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        check_response_body: true
        check_response_body_regex: "OK"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info.objects[0].check_response_body is true

    - name: Create HTTP Health Check with check_response_body_negative
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        check_response_body_negative: false
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info.objects[0].check_response_body_negative is false

    - name: Create HTTP Health Check with check_response_body_regex
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        check_response_body_regex: "OK"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info.objects[0].check_response_body_regex == "OK"

    - name: Create HTTP Health Check with check_response_header
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        check_response_header: true
        check_response_header_regexes:
          - header: "Content-Type"
            regex: "application/json"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info.objects[0].check_response_header is true

    - name: Create HTTP Health Check with check_response_header_negative
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        check_response_header_negative: false
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info.objects[0].check_response_header_negative is false

    - name: Create HTTP Health Check with check_response_header_regexes
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        check_response_header_regexes:
          - header: "Content-Type"
            regex: "application/json"
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info.objects[0].check_response_header_regexes[0].header == "Content-Type"
          - health_check_http_info.objects[0].check_response_header_regexes[0].regex == "application/json"

    - name: Create HTTP Health Check with https flag
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 443
        request: "POST / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        https: true
        state: present
      register: health_check_http
    - name: Get HTTP Health Check information by name (https flag)
      infoblox.universal_ddi.dtc_health_check_http_info:
        filters:
          name: "{{ health_check_http_name }}"
      register: health_check_http_info
    - assert:
        that:
          - health_check_http_info.objects[0].https is true

  always:
    - name: "Delete HTTP Health Check"
      infoblox.universal_ddi.dtc_health_check_http:
        name: "{{ health_check_http_name }}"
        port: 80
        request: "DELETE / HTTP/1.1\r\nHost: localhost\r\n\r\n"
        tags:
          location: "{{ tag_value }}"
        state: absent
      ignore_errors: true

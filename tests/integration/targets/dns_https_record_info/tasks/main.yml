---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"

  block:
    # Create a random HTTPS record name to avoid conflicts
    - ansible.builtin.set_fact:
        record_name: "test-https-record-{{ 999999 | random | string }}"
        tag_value: "site-{{ 999999 | random | string }}"

    # Basic Test for HTTPS Record
    - name: Create an HTTPS Record
      infoblox.universal_ddi.dns_record:
        name_in_zone: "{{ record_name }}"
        zone: "{{ _auth_zone.id }}"
        rdata:
          target_name: "svc.example.com."
        type: "HTTPS"
        tags:
          location: "{{ tag_value }}"
        state: present
      register: https_record

    - name: Get HTTPS Record information by ID
      infoblox.universal_ddi.dns_record_info:
        id: "{{ https_record.id }}"
      register: https_record_info
    - assert:
        that:
          - https_record_info.objects | length == 1

    - name: Get HTTPS Record information by filters
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "{{ record_name }}"
          zone: "{{ _auth_zone.id }}"
          type: "HTTPS"
      register: https_record_info
    - assert:
        that:
          - https_record_info.objects | length == 1
          - https_record_info.objects[0].id == https_record.id

    - name: Get HTTPS Record information by raw filter query
      infoblox.universal_ddi.dns_record_info:
        filter_query: "name_in_zone=='{{ record_name }}' and zone=='{{ _auth_zone.id }}' and type=='HTTPS'"
      register: https_record_info_raw
    - assert:
        that:
          - https_record_info_raw.objects | length == 1
          - https_record_info_raw.objects[0].id == https_record.id

    - name: Get HTTPS Record information by tag filters
      infoblox.universal_ddi.dns_record_info:
        tag_filters:
          location: "{{ tag_value }}"
      register: https_record_info_tag
    - assert:
        that:
          - https_record_info_tag.objects | length == 1
          - https_record_info_tag.objects[0].id == https_record.id

  always:
    # Cleanup if the test fails
    - name: "Delete HTTPS Record"
      infoblox.universal_ddi.dns_record:
        name_in_zone: "{{ record_name }}"
        zone: "{{ _auth_zone.id }}"
        rdata:
          target_name: "svc.example.com."
        type: "HTTPS"
        state: "absent"
      ignore_errors: true

    - name: "Delete Auth Zone"
      ansible.builtin.include_role:
        name: setup_auth_zone
        tasks_from: cleanup.yml

    - name: "Delete the View"
      ansible.builtin.include_role:
        name: setup_view
        tasks_from: cleanup.yml

---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"
  block:

    - name: "Delete DHCP Option Code"
      infoblox.universal_ddi.dhcp_option_code:
        code: 234
        name: "{{ option_code_name }}"
        option_space: "{{ _option_space.id }}"
        type: "boolean"
        state: "absent"
      ignore_errors: true

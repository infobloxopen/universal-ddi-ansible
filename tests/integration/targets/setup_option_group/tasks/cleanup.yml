---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"
  block:
    - name: Delete the DHCP Option Group
      infoblox.universal_ddi.dhcp_option_group:
        name: "{{ option_group_name }}"
        state: "absent"
      ignore_errors: true


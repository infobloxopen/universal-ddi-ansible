---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"
  block:
    - ansible.builtin.set_fact:
        health_check_pdp_name: "test-health-check-pdp-name-{{ 999999 | random | string }}"
        tag_value: "site-{{ 999999 | random | string }}"

    - name: Create PDP Health Check
      infoblox.universal_ddi.dtc_health_check_pdp:
        name: "{{ health_check_pdp_name }}"
        port: 2123
        tags:
          location: "{{ tag_value }}"
        state: present
      register: health_check_pdp

    - name: Get PDP Health Check information by ID
      infoblox.universal_ddi.dtc_health_check_pdp_info:
          id: "{{ health_check_pdp.id }}"
      register: health_check_pdp_info
    - assert:
        that:
          - health_check_pdp_info.objects | length == 1
          - health_check_pdp_info.objects[0].id == health_check_pdp.id

    - name: Get PDP Health Check information by filters (name)
      infoblox.universal_ddi.dtc_health_check_pdp_info:
        filters:
          name: "{{ health_check_pdp_name }}"
      register: health_check_pdp_info
    - assert:
        that:
          - health_check_pdp_info.objects | length == 1
          - health_check_pdp_info.objects[0].id == health_check_pdp.id

    - name: Get PDP Health Check information by filter query
      infoblox.universal_ddi.dtc_health_check_pdp_info:
        filter_query: "name=='{{ health_check_pdp_name }}'"
    - assert:
        that:
          - health_check_pdp_info.objects | length == 1
          - health_check_pdp_info.objects[0].id == health_check_pdp.id

    - name: Get PDP Health Check information by tag filters
      infoblox.universal_ddi.dtc_health_check_pdp_info:
        tag_filters:
          location: "{{ tag_value }}"
    - assert:
        that:
          - health_check_pdp_info.objects | length == 1
          - health_check_pdp_info.objects[0].id == health_check_pdp.id
          - health_check_pdp_info.objects[0].tags.location == tag_value

    - name: Get PDP Health Check information by tag filter query
      infoblox.universal_ddi.dtc_health_check_pdp_info:
        tag_filter_query: "location=='{{ tag_value }}'"
    - assert:
        that:
          - health_check_pdp_info.objects | length == 1
          - health_check_pdp_info.objects[0].id == health_check_pdp.id
          - health_check_pdp_info.objects[0].tags.location == tag_value

  always:
    # Cleanup if the test fails
    - name: "Delete PDP Health Check"
      infoblox.universal_ddi.dtc_health_check_pdp:
        name: "{{ health_check_pdp_name }}"
        port: 2123
        tags:
          location: "{{ tag_value }}"
        state: absent
      ignore_errors: true

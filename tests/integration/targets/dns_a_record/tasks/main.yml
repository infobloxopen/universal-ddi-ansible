---
- module_defaults:
    group/infoblox.universal_ddi.all:
      portal_url: "{{ portal_url }}"
      portal_key: "{{ portal_key }}"

  block:
    # Create an A record with a random name to avoid conflicts
    - ansible.builtin.set_fact:
        record_name: "test-a-record-{{ 999999 | random | string }}"
        record_2_name: "test-a-record-2-{{ 999999 | random | string }}"

    - name: Create an A Record (check mode)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.10.10"
        type: "A"
        state: present
      check_mode: true
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record is changed
          - a_record_info is not failed
          - a_record_info.objects | length == 0

    - name: Create an A Record
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        type: "A"
        rdata:
          address: "192.168.10.10"
        state: present
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record is changed
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record.id
          - a_record_info.objects[0].rdata.address == "192.168.10.10"
          - a_record_info.objects[0].type == "A"
          - a_record_info.objects[0].zone == a_record.object.zone

    - name: Create an A Record (idempotent)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        type: "A"
        rdata:
          address: "192.168.10.10"
        state: present
      register: a_record
    - assert:
        that:
          - a_record is not changed
          - a_record is not failed

    - name: Delete the A Record (check mode)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.10.10"
        type: "A"
        state: absent
      check_mode: true
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record is changed
          - a_record_info is not failed
          - a_record_info.objects | length == 1

    - name: Delete the A Record
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.10.10"
        type: "A"
        state: absent
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record is changed
          - a_record_info is not failed
          - a_record_info.objects | length == 0

    - name: Delete the A Record (idempotent)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.10.10"
        type: "A"
        state: absent
      register: a_record
    - assert:
        that:
          - a_record is not changed
          - a_record is not failed

    - name: Create an A Record with comment
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "10.0.0.0"
        type: "A"
        comment: "This is a test A Record"
        state: present
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record.id
          - a_record_info.objects[0].comment == "This is a test A Record"

    - name: Create an A Record with TTL
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "10.0.0.0"
        type: "A"
        ttl: 3600
        state: present
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record.id
          - a_record_info.objects[0].ttl == 3600

    - name: Create an A Record with Disabled
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "10.0.0.0"
        type: "A"
        disabled: true
        state: present
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record.id
          - a_record_info.objects[0].disabled == true

    - name: Create an A Record with Tags
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "10.0.0.0"
        type: "A"
        tags:
          location: "site-1"
        state: present
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
          filters:
            zone: "{{ _auth_zone.id }}"
            type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record.id
          - a_record_info.objects[0].tags.location == "site-1"

    - name: Create an A Record with Inheritance Sources
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "10.0.0.0"
        type: "A"
        inheritance_sources:
          ttl:
            action: "inherit"
        state: present
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record.id
          - a_record_info.objects[0].inheritance_sources.ttl.action == "inherit"

    - name: Create an A Record with Options (create_ptr and check_rmz are true)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "40.0.0.1"
        type: "A"
        options:
          create_ptr: true
          check_rmz: true
        state: present
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record.id
    - name: Get Information about the PTR Record created in the Reverse Mapping Zone
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ rmz.id }}"
          type: "PTR"
      register: ptr_record_info
    - assert:
        that:
          - ptr_record_info is not failed
          - ptr_record_info.objects | length == 1
          - ptr_record_info.objects[0].zone == rmz.id
          - ptr_record_info.objects[0].name_in_zone == "1"

    - name: Create an A Record with Options (create_ptr is true and check_rmz is false)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "40.0.0.2"
        type: "A"
        options:
          create_ptr: true
          check_rmz: false
        state: present
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record.id
    - name: Get Information about the PTR Record created in the Reverse Mapping Zone
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ rmz.id }}"
          type: "PTR"
      register: ptr_record_info
    - assert:
        that:
          - ptr_record_info is not failed
          - ptr_record_info.objects | length == 1
          - ptr_record_info.objects[0].zone == rmz.id
          - ptr_record_info.objects[0].name_in_zone == "2"

    - name: Create an A Record with Options (create_ptr and check_rmz are false)
      infoblox.universal_ddi.dns_record:
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "50.0.0.0"
        type: "A"
        options:
          create_ptr: false
          check_rmz: false
        state: present
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record.id

    - name: Create an A Record with Name in Zone and Zone
      infoblox.universal_ddi.dns_record:
        name_in_zone: "{{ record_name }}"
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "10.0.0.0"
        type: "A"
        state: present
      register: a_record
    - name: Get Information about the A Record
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "{{ record_name }}"
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record.id
          - a_record_info.objects[0].name_in_zone == a_record.object.name_in_zone
          - a_record_info.objects[0].zone == a_record.object.zone

    - name: Create an A Record with Record Protection - DDI Admin
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-ddi-admin"
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.30.1"
        type: "A"
        configure_record_protection: "DDI Admin"
        state: present
      register: a_record_ddi_admin
    - name: Get information about the A Record with DDI Admin protection
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "protected-ddi-admin"
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_ddi_admin is changed
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record_ddi_admin.id
          - a_record_info.objects[0]['protection']['level'] == "DDI Admin"

    - name: Create an A Record with Record Protection - Global Admin
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-global-admin"
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.30.2"
        type: "A"
        configure_record_protection: "Global Admin"
        state: present
      register: a_record_global_admin
    - name: Get information about the A Record with Global Admin protection
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "protected-global-admin"
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record_global_admin is changed
          - a_record_info is not failed
          - a_record_info.objects | length == 1
          - a_record_info.objects[0].id == a_record_global_admin.id
          - a_record_info.objects[0]['protection']['level'] == "Global Admin"

    - name: Create an A Record with Record Protection - DDI Admin (idempotent)
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-ddi-admin"
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.30.1"
        type: "A"
        configure_record_protection: "DDI Admin"
        state: present
      register: a_record
    - assert:
        that:
          - a_record is not changed
          - a_record is not failed

    - name: Create an A Record with Record Protection - Global Admin (idempotent)
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-global-admin"
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.30.2"
        type: "A"
        configure_record_protection: "Global Admin"
        state: present
      register: a_record
    - assert:
        that:
          - a_record is not changed
          - a_record is not failed

    - name: Update A Record Protection from DDI Admin to Global Admin
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-ddi-admin"
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.30.1"
        type: "A"
        configure_record_protection: "Global Admin"
        state: present
      register: a_record
    - name: Get information about the A Record after protection change
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "protected-ddi-admin"
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record is changed
          - a_record is not failed
          - a_record_info.objects[0]['protection']['level'] == "Global Admin"

    - name: Remove protection from A Record (None)
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-global-admin"
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.30.2"
        type: "A"
        configure_record_protection: "None"
        state: present
      register: a_record
    - name: Get information about the A Record after protection removed
      infoblox.universal_ddi.dns_record_info:
        filters:
          name_in_zone: "protected-global-admin"
          zone: "{{ _auth_zone.id }}"
          type: "A"
      register: a_record_info
    - assert:
        that:
          - a_record is changed
          - a_record is not failed
          - a_record_info.objects[0]['protection'] is not defined or a_record_info.objects[0]['protection']['level'] is not defined

    - name: Remove protection from A Record (None, idempotent)
      infoblox.universal_ddi.dns_record:
        name_in_zone: "protected-global-admin"
        zone: "{{ _auth_zone.id }}"
        rdata:
          address: "192.168.30.2"
        type: "A"
        configure_record_protection: "None"
        state: present
      register: a_record
    - assert:
        that:
          - a_record is not changed
          - a_record is not failed

  always:
     - name: "Remove protection from A Record with DDI Admin protection"
       infoblox.universal_ddi.dns_record:
         name_in_zone: "protected-ddi-admin"
         zone: "{{ _auth_zone.id }}"
         rdata:
           address: "192.168.30.1"
         type: "A"
         configure_record_protection: "None"
         state: present
       ignore_errors: true

     - name: "Delete the A Record with DDI Admin protection"
       infoblox.universal_ddi.dns_record:
         name_in_zone: "protected-ddi-admin"
         zone: "{{ _auth_zone.id }}"
         rdata:
           address: "192.168.30.1"
         type: "A"
         state: absent
       ignore_errors: true

     - name: "Remove protection from A Record with Global Admin protection"
       infoblox.universal_ddi.dns_record:
         name_in_zone: "protected-global-admin"
         zone: "{{ _auth_zone.id }}"
         rdata:
           address: "192.168.30.2"
         type: "A"
         configure_record_protection: "None"
         state: present
       ignore_errors: true

     - name: "Delete the A Record with Global Admin protection"
       infoblox.universal_ddi.dns_record:
         name_in_zone: "protected-global-admin"
         zone: "{{ _auth_zone.id }}"
         rdata:
           address: "192.168.30.2"
         type: "A"
         state: absent
       ignore_errors: true

     - name: "Delete the A Record"
       infoblox.universal_ddi.dns_record:
         name_in_zone: "{{ record_name }}"
         zone: "{{ _auth_zone.id }}"
         rdata:
           address: "10.0.0.0"
         type: "A"
         state: absent
       ignore_errors: true

     - name: "Delete the Auth Zone"
       ansible.builtin.include_role:
         name: setup_auth_zone
         tasks_from: cleanup.yml

     - name: "Delete the Reverse Mapping Zone"
       ansible.builtin.include_role:
         name: setup_auth_zone_rmz
         tasks_from: cleanup.yml

     - name: "Delete the View"
       ansible.builtin.include_role:
         name: setup_view
         tasks_from: cleanup.yml
